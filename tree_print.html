<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>شجرة العائلة — طباعة A0</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#1a120b;color:#eee;direction:rtl}
#ctrl{padding:1.2rem 1.5rem;background:#12090a;border-bottom:2px solid #5d3a1a;display:flex;align-items:center;gap:1rem;flex-wrap:wrap}
#ctrl h1{font-size:1.2rem;color:#d4a842;margin-left:auto}
.btn{padding:.5rem 1.2rem;border-radius:10px;border:none;font-family:Arial,sans-serif;font-size:.88rem;font-weight:700;cursor:pointer}
.bg{background:#c8762a;color:#fff;box-shadow:0 3px 12px rgba(200,118,42,.4)}
.bo{background:transparent;border:1.5px solid #c8762a;color:#d4a842}
#ta{background:#1a0e06;border:1.5px dashed #5d3a1a;border-radius:10px;padding:.8rem;width:100%;color:#d4a842;font-size:.8rem;resize:vertical;min-height:70px;font-family:monospace;direction:ltr}
#st{font-size:.82rem;color:#a08060}
#wrap{overflow:auto;background:#0d0802;min-height:calc(100vh - 120px);padding:1.5rem;display:flex;justify-content:center;align-items:flex-start}
@media print{
  #ctrl{display:none!important}
  #wrap{padding:0;background:white!important;overflow:visible}
  body{background:white!important}
  svg{width:100%!important;height:auto!important}
  @page{size:A0 landscape;margin:0}
}
</style>
</head>
<body>
<div id="ctrl">
  <h1>🌳 طباعة شجرة العائلة</h1>
  <div style="flex:1;min-width:280px;display:flex;flex-direction:column;gap:.4rem">
    <label style="font-size:.78rem;color:#a08060">البيانات تُحمَّل تلقائياً · أو الصق JSON:</label>
    <textarea id="ta" placeholder='[{"id":"1","name":"عبدالله","gender":"ذكر","parentId":null},...]'></textarea>
  </div>
  <div style="display:flex;flex-direction:column;gap:.5rem">
    <button class="btn bg" onclick="go()">🌳 رسم الشجرة</button>
    <button class="btn bg" onclick="demo()">📋 بيانات تجريبية</button>
    <button class="btn bo" onclick="window.print()">🖨️ طباعة A0 PDF</button>
  </div>
  <span id="st">في انتظار البيانات…</span>
</div>
<div id="wrap"><svg id="svg"></svg></div>

<script>
// ─────────────────────────────────────────────────
//  ORGANIC FAMILY TREE  —  شجرة عائلة طبيعية
// ─────────────────────────────────────────────────

const W = 5000, H = 3800; // SVG coordinate space (A0 landscape ratio ~1.41)

// ── Colour palette ─────────────────────────────
const C = {
  bark:     '#6B3F10', barkD:   '#4A2A08', barkL: '#8B5A2B',
  branch:   '#7B4A1A', branchL: '#A06828',
  leafM:    '#3B7A2A', leafML:  '#5BA640', leafMD: '#2A5E1C',  // male
  leafF:    '#D45480', leafFL:  '#F07BA0', leafFD: '#A83060',  // female
  leafDead: '#A09080', leafDL:  '#BFB0A0',
  nodeBg:   '#8B6914', nodeL:   '#C8A030', nodeT:  '#FFF8E0',
  title:    '#3E1F05',
  bg0:      '#FEFAF0', bg1:     '#F5E8C8',
  ground:   '#5D3B1A', groundL: '#8B5E30',
  label:    '#FFF8E0',
  shadow:   'rgba(60,30,0,0.25)',
};

// ── Layout algorithm (Walker-style) ─────────────
function buildLayout(members) {
  const byId = {}, ch = {};
  members.forEach(m => { byId[m.id] = m; ch[m.id] = []; });
  const roots = [];
  members.forEach(m => {
    const p = m.parentId;
    if (p && ch[p] !== undefined) ch[p].push(m.id);
    else if (!p || !byId[p]) roots.push(m.id);
  });

  // Subtree width
  const NW = 130, HG = 35;
  function sw(id) {
    const kids = ch[id] || [];
    if (!kids.length) return NW;
    return Math.max(NW, kids.reduce((s,c)=>s+sw(c),0) + HG*(kids.length-1));
  }

  const pos = {};
  function place(id, x, y) {
    const kids = ch[id] || [];
    if (!kids.length) { pos[id]={x,y}; return x+NW; }
    const ws = kids.map(sw);
    const tot = ws.reduce((s,w)=>s+w,0) + HG*(kids.length-1);
    pos[id] = { x: x+(tot-NW)/2, y };
    let cx = x;
    kids.forEach((kid,i) => { place(kid, cx, y+110+35); cx+=ws[i]+HG; });
    return x+tot;
  }
  let cx = 60;
  roots.forEach(r => { place(r,cx,60); cx += sw(r)+HG*4; });

  return { byId, ch, roots, pos };
}

// ── SVG helpers ──────────────────────────────────
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function leafPath(cx, cy, w, h, angle) {
  // Organic leaf shape using cubic bezier
  const a = (angle||0)*Math.PI/180;
  const cos = Math.cos(a), sin = Math.sin(a);
  function rot(px,py){ return [cx+px*cos-py*sin, cy+px*sin+py*cos]; }
  const [x0,y0]=rot(0,-h/2), [x1,y1]=rot(w*0.6,-h*0.1),
        [x2,y2]=rot(w*0.5, h*0.4), [x3,y3]=rot(0,h/2),
        [x4,y4]=rot(-w*0.5,h*0.4), [x5,y5]=rot(-w*0.6,-h*0.1);
  return `M${x0},${y0} C${x1},${y1} ${x2},${y2} ${x3},${y3} C${x4},${y4} ${x5},${y5} Z`;
}

function branchPath(x1,y1,x2,y2,thick) {
  // Curved branch connecting parent to child
  const mx = (x1+x2)/2, my = (y1+y2)/2 - Math.abs(x2-x1)*0.15;
  return `<path d="M${x1},${y1} Q${mx},${my} ${x2},${y2}"
    fill="none" stroke="${C.branch}" stroke-width="${thick}" stroke-linecap="round" opacity="0.85"/>`;
}

// ── Draw the full tree ───────────────────────────
function drawTree(members) {
  const { byId, ch, roots, pos } = buildLayout(members);

  // Compute canvas bounds
  let maxX = 0, maxY = 0;
  Object.values(pos).forEach(p => { maxX=Math.max(maxX,p.x+130); maxY=Math.max(maxY,p.y+70); });
  const VW = maxX+100, VH = maxY+300;

  let bgSvg='', trunkSvg='', edgeSvg='', leafSvg='', nodeSvg='', titleSvg='';

  // ── Background ──────────────────────────────────
  bgSvg = `
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="35%" r="75%">
      <stop offset="0%" stop-color="${C.bg0}"/>
      <stop offset="100%" stop-color="${C.bg1}"/>
    </radialGradient>
    <radialGradient id="trunkGrad" cx="40%" cy="50%" r="60%">
      <stop offset="0%" stop-color="${C.barkL}"/>
      <stop offset="100%" stop-color="${C.barkD}"/>
    </radialGradient>
    <filter id="leafShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="${C.shadow}"/>
    </filter>
    <filter id="nodeShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="5" flood-color="${C.shadow}"/>
    </filter>
    <filter id="trunkShadow" x="-10%" y="-5%" width="120%" height="110%">
      <feDropShadow dx="3" dy="5" stdDeviation="8" flood-color="rgba(0,0,0,0.3)"/>
    </filter>
    <!-- Decorative corner pattern -->
    <pattern id="cornerPat" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.5" fill="${C.barkL}" opacity="0.15"/>
    </pattern>
  </defs>
  <rect width="${VW}" height="${VH}" fill="url(#bgGrad)"/>
  <!-- Parchment texture overlay -->
  <rect width="${VW}" height="${VH}" fill="url(#cornerPat)"/>
  <!-- Decorative border -->
  <rect x="12" y="12" width="${VW-24}" height="${VH-24}"
    fill="none" stroke="${C.barkL}" stroke-width="4" opacity="0.5" rx="8"/>
  <rect x="20" y="20" width="${VW-40}" height="${VH-40}"
    fill="none" stroke="${C.barkL}" stroke-width="1.5" opacity="0.35" rx="6"/>`;

  // ── Ground / Grass ───────────────────────────────
  const groundY = VH - 160;
  bgSvg += `
  <!-- Ground -->
  <ellipse cx="${VW/2}" cy="${groundY+40}" rx="${VW*0.42}" ry="60"
    fill="#4A7A20" opacity="0.25"/>
  <ellipse cx="${VW/2}" cy="${groundY+50}" rx="${VW*0.38}" ry="45"
    fill="#5A8A28" opacity="0.2"/>
  <!-- Ground line -->
  <path d="M${VW*0.05},${groundY} Q${VW*0.3},${groundY-15} ${VW/2},${groundY}
           Q${VW*0.7},${groundY+15} ${VW*0.95},${groundY}"
    fill="none" stroke="${C.ground}" stroke-width="3" opacity="0.4"/>`;

  // ── Main trunk ───────────────────────────────────
  // Find root centers
  const rootXs = roots.map(r => pos[r] ? pos[r].x+65 : VW/2);
  const trunkCX = rootXs.reduce((s,x)=>s+x,0)/rootXs.length;

  trunkSvg = `
  <!-- Main trunk -->
  <path d="M${trunkCX-50},${groundY+50}
           C${trunkCX-55},${groundY-30} ${trunkCX-35},${groundY-80} ${trunkCX-20},${groundY-150}
           L${trunkCX+20},${groundY-150}
           C${trunkCX+35},${groundY-80} ${trunkCX+55},${groundY-30} ${trunkCX+50},${groundY+50} Z"
    fill="url(#trunkGrad)" filter="url(#trunkShadow)"/>
  <!-- Trunk texture lines -->
  <path d="M${trunkCX-15},${groundY+40} C${trunkCX-10},${groundY-20} ${trunkCX-5},${groundY-80} ${trunkCX},${groundY-145}"
    fill="none" stroke="${C.barkD}" stroke-width="1.5" opacity="0.35"/>
  <path d="M${trunkCX+10},${groundY+40} C${trunkCX+15},${groundY-20} ${trunkCX+8},${groundY-80} ${trunkCX+3},${groundY-145}"
    fill="none" stroke="${C.barkD}" stroke-width="1" opacity="0.25"/>`;

  // ── Collect all edges & nodes ────────────────────
  function traverseEdges(id, depth) {
    const kids = ch[id] || [];
    const p = pos[id];
    if (!p) return;
    const px = p.x + 65, py = p.y + 35;
    kids.forEach(kid => {
      const cp = pos[kid];
      if (!cp) return;
      const cx2 = cp.x+65, cy2 = cp.y;
      // Branch thickness decreases with depth
      const thick = Math.max(1.5, 5 - depth*0.8);
      edgeSvg += branchPath(px, py, cx2, cy2, thick);
      traverseEdges(kid, depth+1);
    });
  }
  // Connect trunk to roots
  roots.forEach(r => {
    const rp = pos[r];
    if (!rp) return;
    const rx2 = rp.x+65, ry2 = rp.y;
    edgeSvg += branchPath(trunkCX, groundY-160, rx2, ry2, 7);
  });
  roots.forEach(r => traverseEdges(r, 0));

  // ── Draw nodes ───────────────────────────────────
  let leafAngle = 0;
  function drawNode(id, depth) {
    const p = pos[id];
    if (!p) return;
    const m = byId[id];
    const kids = ch[id] || [];
    const hasCh = kids.length > 0;
    const cx2 = p.x+65, cy2 = p.y+35;
    const isFem = m.gender === 'أنثى';
    const isDead = m.status === 'متوفى';
    const name = esc(m.name || '?');
    const sub = esc((m.role||m.job||'').slice(0,14));

    if (hasCh) {
      // ── Branch node: oval label on branch ──────
      let fill, stroke, tf;
      if (isDead)     { fill='#8A7A6A'; stroke='#6A5A4A'; tf=C.label; }
      else if (isFem) { fill='#C06890'; stroke='#905060'; tf='#FFF0F5'; }
      else            { fill=C.nodeBg; stroke='#7A5010'; tf=C.nodeT; }
      // Oval badge
      nodeSvg += `<ellipse cx="${cx2}" cy="${cy2}" rx="62" ry="28"
        fill="${fill}" stroke="${stroke}" stroke-width="2.5"
        filter="url(#nodeShadow)"/>`;
      // Inner highlight
      nodeSvg += `<ellipse cx="${cx2}" cy="${cy2-6}" rx="45" ry="16"
        fill="white" opacity="0.08"/>`;
      // Name
      nodeSvg += `<text x="${cx2}" y="${sub?cy2-5:cy2}"
        text-anchor="middle" dominant-baseline="middle"
        font-family="Arial" font-size="${name.length>8?12:14}"
        font-weight="800" fill="${tf}" direction="rtl">${name}</text>`;
      if (sub) nodeSvg += `<text x="${cx2}" y="${cy2+10}"
        text-anchor="middle" dominant-baseline="middle"
        font-family="Arial" font-size="9" fill="${tf}" opacity="0.75"
        direction="rtl">${sub}</text>`;

    } else {
      // ── Leaf node ─────────────────────────────
      leafAngle = (leafAngle + 23) % 60 - 30; // varied angles
      const angle = leafAngle + (isFem ? 10 : -10);
      let fill, fillL, fillD, stroke;
      if (isDead)     { fill=C.leafDead; fillL=C.leafDL; fillD=C.leafDead; stroke='#808070'; }
      else if (isFem) { fill=C.leafF;   fillL=C.leafFL;  fillD=C.leafFD;  stroke=C.leafFD; }
      else            { fill=C.leafM;   fillL=C.leafML;  fillD=C.leafMD;  stroke=C.leafMD; }

      const lw = 56, lh = 34;
      const d = leafPath(cx2, cy2, lw, lh, angle);
      leafSvg += `<path d="${d}" fill="${fill}" stroke="${stroke}"
        stroke-width="1.5" filter="url(#leafShadow)" opacity="0.92"/>`;
      // Leaf vein
      const va = angle*Math.PI/180;
      const vx = cx2+Math.sin(va)*lh*0.38, vy = cy2-Math.cos(va)*lh*0.38;
      leafSvg += `<line x1="${cx2}" y1="${cy2}" x2="${vx}" y2="${vy}"
        stroke="${fillD}" stroke-width="1" opacity="0.5"/>`;
      // Name on leaf
      const fs = name.length > 6 ? 8.5 : 10;
      leafSvg += `<text x="${cx2}" y="${cy2}"
        text-anchor="middle" dominant-baseline="middle"
        font-family="Arial" font-size="${fs}" font-weight="700"
        fill="${isDead?'#555':'#FFF'}" direction="rtl"
        transform="rotate(${angle},${cx2},${cy2})">${name}</text>`;
    }
    kids.forEach(kid => drawNode(kid, depth+1));
  }
  roots.forEach(r => drawNode(r, 0));

  // ── Title ────────────────────────────────────────
  titleSvg = `
  <text x="${VW/2}" y="62"
    text-anchor="middle" font-family="Arial" font-size="42"
    font-weight="900" fill="${C.title}" direction="rtl"
    letter-spacing="3">شجرة الأسرة</text>
  <text x="${VW/2}" y="100"
    text-anchor="middle" font-family="Arial" font-size="16"
    fill="${C.barkL}" opacity="0.7" direction="rtl">طُبع بواسطة موقع شجرة العائلة</text>`;

  // ── Legend ───────────────────────────────────────
  const lx=30, ly=VH-145;
  const legend = `
  <rect x="${lx}" y="${ly}" width="280" height="130" rx="12"
    fill="rgba(255,252,240,0.92)" stroke="${C.barkL}" stroke-width="1.5"/>
  <text x="${lx+140}" y="${ly+22}" text-anchor="middle"
    font-family="Arial" font-size="14" font-weight="700"
    fill="${C.title}" direction="rtl">دليل الألوان</text>
  ${(() => {
    const items=[
      [C.leafM,C.leafMD,'ذكر'],
      [C.leafF,C.leafFD,'أنثى'],
      [C.leafDead,'#808070','متوفى'],
      [C.nodeBg,'#7A5010','أب / فرع'],
    ];
    return items.map((it,i)=>{
      const iy=ly+45+i*22;
      if(i===3){
        return `<ellipse cx="${lx+28}" cy="${iy}" rx="22" ry="11" fill="${it[0]}" stroke="${it[1]}" stroke-width="1.5"/>
        <text x="${lx+60}" y="${iy+5}" font-family="Arial" font-size="12" fill="#333" direction="rtl">${it[2]}</text>`;
      }
      const d=leafPath(lx+28,iy,40,24,0);
      return `<path d="${d}" fill="${it[0]}" stroke="${it[1]}" stroke-width="1.5"/>
      <text x="${lx+60}" y="${iy+5}" font-family="Arial" font-size="12" fill="#333" direction="rtl">${it[2]}</text>`;
    }).join('');
  })()}`;

  // ── Stats ────────────────────────────────────────
  const males   = members.filter(m=>m.gender==='ذكر').length;
  const females = members.filter(m=>m.gender==='أنثى').length;
  const dead    = members.filter(m=>m.status==='متوفى').length;
  const sx = VW-320, sy = VH-145;
  const stats = `
  <rect x="${sx}" y="${sy}" width="280" height="130" rx="12"
    fill="rgba(255,252,240,0.92)" stroke="${C.barkL}" stroke-width="1.5"/>
  <text x="${sx+140}" y="${sy+22}" text-anchor="middle"
    font-family="Arial" font-size="14" font-weight="700"
    fill="${C.title}" direction="rtl">إحصائيات الشجرة</text>
  <text x="${sx+250}" y="${sy+52}" text-anchor="end" font-family="Arial" font-size="12" fill="#333" direction="rtl">إجمالي الأفراد:</text>
  <text x="${sx+260}" y="${sy+52}" font-family="Arial" font-size="14" font-weight="700" fill="${C.barkL}">${members.length}</text>
  <text x="${sx+250}" y="${sy+78}" text-anchor="end" font-family="Arial" font-size="12" fill="#333" direction="rtl">الذكور:</text>
  <text x="${sx+260}" y="${sy+78}" font-family="Arial" font-size="14" font-weight="700" fill="${C.leafMD}">${males}</text>
  <text x="${sx+250}" y="${sy+104}" text-anchor="end" font-family="Arial" font-size="12" fill="#333" direction="rtl">الإناث:</text>
  <text x="${sx+260}" y="${sy+104}" font-family="Arial" font-size="14" font-weight="700" fill="${C.leafFD}">${females}</text>
  <text x="${sx+250}" y="${sy+125}" text-anchor="end" font-family="Arial" font-size="12" fill="#333" direction="rtl">رحمهم الله:</text>
  <text x="${sx+260}" y="${sy+125}" font-family="Arial" font-size="14" font-weight="700" fill="#808070">${dead}</text>`;

  // ── Assemble SVG ─────────────────────────────────
  const svg = document.getElementById('svg');
  svg.setAttribute('viewBox', `0 0 ${VW} ${VH}`);
  svg.setAttribute('width', VW);
  svg.setAttribute('height', VH);
  svg.style.maxWidth = '100%';
  svg.innerHTML = bgSvg + trunkSvg + edgeSvg + leafSvg + nodeSvg + titleSvg + legend + stats;

  document.getElementById('st').textContent =
    `✅ ${members.length} فرد · ${males} ذكر · ${females} أنثى · مساحة: ${(VW/3.78).toFixed(0)}×${(VH/3.78).toFixed(0)} مم`;
}

// ── Data loaders ──────────────────────────────────
function demo() {
  const d=[
    {id:'1',name:'عبدالله',role:'الجد الأكبر',gender:'ذكر',status:'متوفى',parentId:null},
    {id:'2',name:'محمد',role:'',gender:'ذكر',status:'حي',parentId:'1'},
    {id:'3',name:'أحمد',role:'',gender:'ذكر',status:'حي',parentId:'1'},
    {id:'4',name:'سارة',role:'',gender:'أنثى',status:'حي',parentId:'1'},
    {id:'5',name:'علي',gender:'ذكر',status:'حي',parentId:'2'},
    {id:'6',name:'فاطمة',gender:'أنثى',status:'حي',parentId:'2'},
    {id:'7',name:'خالد',gender:'ذكر',status:'حي',parentId:'3'},
    {id:'8',name:'نورة',gender:'أنثى',status:'حي',parentId:'3'},
    {id:'9',name:'عمر',gender:'ذكر',status:'حي',parentId:'5'},
    {id:'10',name:'ريم',gender:'أنثى',status:'حي',parentId:'5'},
    {id:'11',name:'سلطان',gender:'ذكر',status:'حي',parentId:'7'},
    {id:'12',name:'هند',gender:'أنثى',status:'حي',parentId:'7'},
    {id:'13',name:'فيصل',gender:'ذكر',status:'متوفى',parentId:'2'},
    {id:'14',name:'منى',gender:'أنثى',status:'حي',parentId:'3'},
  ];
  document.getElementById('ta').value=JSON.stringify(d,null,2);
  drawTree(d);
}

function go() {
  try { drawTree(JSON.parse(document.getElementById('ta').value)); }
  catch(e) { alert('خطأ: '+e.message); }
}

window.onload=function(){
  const s=localStorage.getItem('familyTreePrintData');
  if(s){try{const d=JSON.parse(s);document.getElementById('ta').value=s;drawTree(d);return;}catch(e){}}
  demo();
};
</script>
</body>
</html>
